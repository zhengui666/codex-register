services:
  webui:
    build: .
    ports:
      - "15555:8000"
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - APP_ACCESS_PASSWORD=admin123
      - DEBUG=0
      - LOG_LEVEL=info
      - WARP_ENABLED=1
      - WARP_PROXY_URL=socks5h://127.0.0.1:40000
    volumes:
      # 挂载数据目录以持久化数据库和日志
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=5).read()
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
